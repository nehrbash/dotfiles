<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Power symbol - lighter bark texture to show on dark trunk -->
  <!-- The arc -->
  <path d="M5.5 7 C3.5 9, 2.5 11.5, 2.5 14 C2.5 19, 6.5 22.5, 12 22.5 C17.5 22.5, 21.5 19, 21.5 14 C21.5 11.5, 20.5 9, 18.5 7"
    stroke="#8a7060" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Highlight -->
  <path d="M5.5 7 C3.5 9, 2.5 11.5, 2.5 14 C2.5 19, 6.5 22.5, 12 22.5 C17.5 22.5, 21.5 19, 21.5 14 C21.5 11.5, 20.5 9, 18.5 7"
    stroke="#a89078" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Grain on arc -->
  <path d="M4 10 C3.2 12, 3 14, 3.5 16" stroke="#6b5040" stroke-width="0.5" fill="none" opacity="0.6"/>
  <path d="M20 10 C20.8 12, 21 14, 20.5 16" stroke="#6b5040" stroke-width="0.5" fill="none" opacity="0.6"/>

  <!-- The stem -->
  <path d="M12 2 L12 12" stroke="#8a7060" stroke-width="3" stroke-linecap="round"/>
  <path d="M12 2 L12 12" stroke="#a89078" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Grain on stem -->
  <path d="M11.3 3 L11.3 11" stroke="#6b5040" stroke-width="0.4" fill="none" opacity="0.5"/>

  <!-- Knot -->
  <circle cx="12" cy="7" r="0.8" fill="#6b5040" opacity="0.6"/>
</svg>
