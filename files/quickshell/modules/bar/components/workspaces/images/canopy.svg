<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 35">
  <!-- Dense leaf clusters forming canopy -->
  <!-- Background layer -->
  <ellipse cx="30" cy="20" rx="28" ry="16" fill="#2a4a2a" opacity="0.8"/>
  <ellipse cx="20" cy="18" rx="18" ry="14" fill="#2d5a2d" opacity="0.7"/>
  <ellipse cx="40" cy="18" rx="18" ry="14" fill="#2d5a2d" opacity="0.7"/>
  <!-- Mid layer -->
  <ellipse cx="30" cy="16" rx="22" ry="12" fill="#355e35" opacity="0.8"/>
  <ellipse cx="15" cy="14" rx="14" ry="10" fill="#3a6b3a" opacity="0.6"/>
  <ellipse cx="45" cy="14" rx="14" ry="10" fill="#3a6b3a" opacity="0.6"/>
  <!-- Top highlights -->
  <ellipse cx="30" cy="12" rx="16" ry="8" fill="#4a7a4a" opacity="0.5"/>
  <ellipse cx="22" cy="10" rx="10" ry="6" fill="#4a7a4a" opacity="0.4"/>
  <ellipse cx="38" cy="10" rx="10" ry="6" fill="#4a7a4a" opacity="0.4"/>
  <!-- Individual leaf accents -->
  <ellipse cx="10" cy="16" rx="4" ry="6" fill="#3d6b3d" opacity="0.7" transform="rotate(-20 10 16)"/>
  <ellipse cx="50" cy="16" rx="4" ry="6" fill="#3d6b3d" opacity="0.7" transform="rotate(20 50 16)"/>
  <ellipse cx="30" cy="8" rx="5" ry="3" fill="#5a8a5a" opacity="0.4"/>
  <!-- Light dappling -->
  <circle cx="25" cy="14" r="2" fill="#6a9a6a" opacity="0.3"/>
  <circle cx="35" cy="12" r="1.5" fill="#6a9a6a" opacity="0.25"/>
  <circle cx="18" cy="18" r="1.5" fill="#6a9a6a" opacity="0.2"/>
</svg>
