<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 35" width="30" height="35">
  <!-- Tree hollow / knothole background -->
  <ellipse cx="15" cy="18" rx="14" ry="16" fill="#1f1610"/>
  <ellipse cx="15" cy="18" rx="12" ry="14" fill="#2a1f15"/>
  <!-- Inner hollow shadow gradient -->
  <ellipse cx="15" cy="18" rx="10" ry="12" fill="#1a1208"/>

  <!-- Hollow rim / bark edge -->
  <path d="M15,2 C8,2 3,9 2,18 C1,27 7,34 15,34 C23,34 29,27 28,18 C27,9 22,2 15,2Z
           M15,4 C21,4 25,10 26,18 C27,26 22,32 15,32 C8,32 3,26 4,18 C5,10 9,4 15,4Z"
        fill="#5c4333"/>
  <path d="M15,2 C10,2 5,7 3,14 C4,8 9,4 15,4 C21,4 26,8 27,14 C25,7 20,2 15,2Z"
        fill="#6b5040" opacity="0.5"/>

  <!-- Owl body -->
  <ellipse cx="15" cy="22" rx="7" ry="8" fill="#6b5040"/>
  <!-- Belly lighter area -->
  <ellipse cx="15" cy="24" rx="4.5" ry="5" fill="#8b7355"/>

  <!-- Owl head -->
  <circle cx="15" cy="14" r="6" fill="#6b5040"/>

  <!-- Ear tufts -->
  <path d="M10,9 C9,6 8,5 9,4 C10,5 11,7 11,9Z" fill="#6b5040"/>
  <path d="M20,9 C21,6 22,5 21,4 C20,5 19,7 19,9Z" fill="#6b5040"/>

  <!-- Facial disc -->
  <circle cx="12" cy="13.5" r="3.5" fill="#8b7355"/>
  <circle cx="18" cy="13.5" r="3.5" fill="#8b7355"/>

  <!-- Eyes - outer -->
  <circle cx="12" cy="13.5" r="2.5" fill="#d4a017"/>
  <circle cx="18" cy="13.5" r="2.5" fill="#d4a017"/>

  <!-- Eyes - pupil -->
  <circle cx="12" cy="13.5" r="1.3" fill="#1a1208"/>
  <circle cx="18" cy="13.5" r="1.3" fill="#1a1208"/>

  <!-- Eyes - highlight -->
  <circle cx="12.8" cy="12.8" r="0.5" fill="#fff" opacity="0.8"/>
  <circle cx="18.8" cy="12.8" r="0.5" fill="#fff" opacity="0.8"/>

  <!-- Beak -->
  <path d="M14,16 L15,18 L16,16Z" fill="#c4942a"/>

  <!-- Chest feather lines -->
  <path d="M13,22 C13,24 14,25.5 15,26" stroke="#6b5040" stroke-width="0.4" fill="none" opacity="0.6"/>
  <path d="M17,22 C17,24 16,25.5 15,26" stroke="#6b5040" stroke-width="0.4" fill="none" opacity="0.6"/>
  <path d="M12.5,23.5 C13,25 14,26.5 15,27" stroke="#6b5040" stroke-width="0.3" fill="none" opacity="0.4"/>
  <path d="M17.5,23.5 C17,25 16,26.5 15,27" stroke="#6b5040" stroke-width="0.3" fill="none" opacity="0.4"/>

  <!-- Feet -->
  <path d="M12,29 C11,30 10,30.5 10,30 C10.5,30 11,29.5 12,29.5Z" fill="#c4942a"/>
  <path d="M12,29 C12,30 12,30.5 11.5,30.5 C11.5,30 12,29.5 12,29.5Z" fill="#c4942a"/>
  <path d="M18,29 C19,30 20,30.5 20,30 C19.5,30 19,29.5 18,29.5Z" fill="#c4942a"/>
  <path d="M18,29 C18,30 18,30.5 18.5,30.5 C18.5,30 18,29.5 18,29.5Z" fill="#c4942a"/>
</svg>
