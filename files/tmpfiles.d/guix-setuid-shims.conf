# Create /run/setuid-programs/ symlinks so Guix-built binaries (Quickshell PAM,
# polkit) can find the setuid helpers they expect on a non-Guix host (Arch).
d /run/setuid-programs 0755 root root -
L+ /run/setuid-programs/unix_chkpwd - - - - /usr/bin/unix_chkpwd
L+ /run/setuid-programs/polkit-agent-helper-1 - - - - /usr/lib/polkit-1/polkit-agent-helper-1
